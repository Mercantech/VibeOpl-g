services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vibeoplg
      POSTGRES_PASSWORD: vibeoplg
      POSTGRES_DB: vibeoplg
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeoplg"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vibeoplg
      MINIO_ROOT_PASSWORD: vibeoplgsecret
    ports:
      - "${MINIO_API_HOST_PORT:-4011}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-4012}:9001"
    volumes:
      - miniodata:/data

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://vibeoplg:vibeoplg@db:5432/vibeoplg
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: vibeoplg
      MINIO_SECRET_KEY: vibeoplgsecret
      MINIO_BUCKET: vibeoplg
      MINIO_SECURE: "false"
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    expose:
      - "8000"

  web:
    build: ./frontend
    ports:
      - "${WEB_HOST_PORT:-4010}:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
  miniodata:
